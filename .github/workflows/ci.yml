name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout termin-inspect
        uses: actions/checkout@v4

      - name: Checkout termin-base
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/termin-base
          token: ${{ secrets.CLONETOKEN }}
          path: deps/termin-base

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip setuptools wheel nanobind

      - name: Configure and install termin-base
        run: |
          cmake -S deps/termin-base -B deps/termin-base/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTERMIN_BASE_BUILD_TESTS=ON \
            -DTCBASE_BUILD_PYTHON=OFF \
            -DCMAKE_INSTALL_PREFIX=/opt/termin
          cmake --build deps/termin-base/build --parallel
          sudo cmake --install deps/termin-base/build
          ctest --test-dir deps/termin-base/build --output-on-failure

      - name: Configure termin-inspect
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTI_BUILD_TESTS=ON \
            -DTI_BUILD_PYTHON=ON \
            -DCMAKE_PREFIX_PATH=/opt/termin

      - name: Build termin-inspect
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
